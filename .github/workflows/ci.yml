name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:version
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm test
      - run: pnpm lint:packages
      - run: pnpm build:cdn
      - run: pnpm verify:cdn
      - run: pnpm exec wrangler deploy --config cdn/wrangler.jsonc --dry-run
