name: Release npm + CDN

# One tag is one release across all npm packages and both CDN channels. The
# immutable CDN version must be live and hash-verified before npm is allowed to
# publish. The mutable seatlayer-js@<major> channel moves only after npm
# succeeds — and it moves by publishing -/versions.json, not by copying bytes.
on:
  push:
    tags: ['v*']

concurrency:
  group: seatlayer-release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance (public repo + OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify tag and lockstep package versions
        run: pnpm check:version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
      - run: pnpm check:sync
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint:packages
      - name: Build one browser bundle from the npm source tree
        run: pnpm build:cdn
        env:
          SEATLAYER_RELEASE_COMMIT: ${{ github.sha }}
      - run: pnpm verify:cdn
      - name: Upload immutable CDN release
        run: pnpm cdn:upload:immutable
        env:
          CDN_UPLOAD_CONFIRMED: '1'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy dedicated CDN Worker
        run: pnpm exec wrangler deploy --config cdn/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify immutable CDN bytes before npm
        run: pnpm verify:cdn:remote immutable
      - name: Publish npm packages with provenance
        run: pnpm publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          RELEASE_PUBLISH_CONFIRMED: '1'
      # Publishing the version index is the promotion: the Worker resolves
      # seatlayer-js@<major> by reading it and 302-ing to the pinned URL that
      # was already verified live above.
      - name: Promote the mutable CDN channel (publish -/versions.json)
        run: pnpm cdn:promote
        env:
          CDN_UPLOAD_CONFIRMED: '1'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify the alias redirects to the freshly published version
        run: pnpm verify:cdn:remote full
