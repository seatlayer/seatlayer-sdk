name: Release

# Publishes any package whose version isn't yet on npm, in dependency order.
# Trigger: push a version tag, e.g.  git tag v0.1.2 && git push origin v0.1.2
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance (public repo + OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      # pnpm publishes in dependency order and skips versions already on npm.
      - run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
